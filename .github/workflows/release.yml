name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-all-platforms:
    strategy:
      matrix:
        platform: [linux-x64, linux-arm64, win32-x64, win32-arm64, darwin-x64, darwin-arm64]
      max-parallel: 2  # 限制同时运行的作业数量
    
    runs-on: ubuntu-20.04
    continue-on-error: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bsv-language-server/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'linux-x64' && 'x86_64-unknown-linux-gnu' || 
                    matrix.platform == 'linux-arm64' && 'aarch64-unknown-linux-gnu' ||
                    matrix.platform == 'win32-x64' && 'x86_64-pc-windows-msvc' ||
                    matrix.platform == 'win32-arm64' && 'aarch64-pc-windows-msvc' ||
                    matrix.platform == 'darwin-x64' && 'x86_64-apple-darwin' ||
                    'aarch64-apple-darwin' }}

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          if [ "${{ matrix.platform }}" = "linux-arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi
          if [[ "${{ matrix.platform }}" == win32-* ]]; then
            sudo apt-get install -y mingw-w64
          fi
          if [[ "${{ matrix.platform }}" == darwin-* ]]; then
            # 安装macOS交叉编译工具链
            sudo apt-get install -y clang lld
            # 安装macOS SDK（如果需要）
            # 注意：macOS交叉编译可能需要额外的配置
          fi

      - name: Build Tree-sitter BSV parser
        run: |
          cd tree-sitter-bsv
          npm install
          npx tree-sitter generate
          npx tree-sitter test

      - name: Build Rust language server
        run: |
          cd bsv-language-server
          
          # Determine target
          case "${{ matrix.platform }}" in
            linux-x64)
              target="x86_64-unknown-linux-gnu"
              ;;
            linux-arm64)
              target="aarch64-unknown-linux-gnu"
              ;;
            win32-x64)
              target="x86_64-pc-windows-msvc"
              ;;
            win32-arm64)
              target="aarch64-pc-windows-msvc"
              ;;
            darwin-x64)
              target="x86_64-apple-darwin"
              ;;
            darwin-arm64)
              target="aarch64-apple-darwin"
              ;;
          esac
          
          echo "Building for target: $target"
          cargo build --release --target $target
          
          # Create server directory structure for packaging
          mkdir -p server
          
          # Copy binary to server directory with platform-specific naming
          if [[ "${{ matrix.platform }}" == win32-* ]]; then
            mkdir -p server/${{ matrix.platform }}
            cp target/$target/release/bsv-language-server.exe server/${{ matrix.platform }}/bsv-language-server.exe
            echo "Copied binary to server/${{ matrix.platform }}/bsv-language-server.exe"
          else
            mkdir -p server/${{ matrix.platform }}
            cp target/$target/release/bsv-language-server server/${{ matrix.platform }}/bsv-language-server
            chmod +x server/${{ matrix.platform }}/bsv-language-server
            echo "Copied binary to server/${{ matrix.platform }}/bsv-language-server"
          fi

      - name: Install VS Code Extension dependencies
        run: |
          cd bsv-language-server
          npm ci

      - name: Compile TypeScript client
        run: |
          cd bsv-language-server
          npm run compile

      - name: Install vsce
        run: |
          npm install -g @vscode/vsce

      - name: Verify server binaries
        run: |
          cd bsv-language-server
          echo "Server directory structure:"
          find server -type f -name "*" | sort
          if [ -d "server/${{ matrix.platform }}" ]; then
            echo "Binary for ${{ matrix.platform }}:"
            ls -la server/${{ matrix.platform }}/
          fi

      - name: Package VSIX
        run: |
          cd bsv-language-server
          echo "Packaging VSIX for ${{ matrix.platform }}"
          vsce package --target ${{ matrix.platform }} --out ../bsv-language-server-${{ matrix.platform }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsv-language-server-${{ matrix.platform }}
          path: bsv-language-server-${{ matrix.platform }}.vsix
          retention-days: 5

  create-release:
    runs-on: ubuntu-20.04
    needs: build-all-platforms
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.vsix" | sort

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/bsv-language-server-linux-x64/bsv-language-server-linux-x64.vsix
            artifacts/bsv-language-server-linux-arm64/bsv-language-server-linux-arm64.vsix
            artifacts/bsv-language-server-win32-x64/bsv-language-server-win32-x64.vsix
            artifacts/bsv-language-server-win32-arm64/bsv-language-server-win32-arm64.vsix
            artifacts/bsv-language-server-darwin-x64/bsv-language-server-darwin-x64.vsix
            artifacts/bsv-language-server-darwin-arm64/bsv-language-server-darwin-arm64.vsix