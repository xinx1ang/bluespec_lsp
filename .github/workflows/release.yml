name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-x64:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bsv-language-server/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Tree-sitter BSV parser
        run: |
          cd tree-sitter-bsv
          npm install
          npx tree-sitter generate
          npx tree-sitter test

      - name: Build Rust language server
        run: |
          cd bsv-language-server
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p bin
          cp target/x86_64-unknown-linux-gnu/release/bsv-language-server bin/
          chmod +x bin/bsv-language-server

      - name: Install VS Code Extension dependencies
        run: |
          cd bsv-language-server
          npm ci

      - name: Compile TypeScript client
        run: |
          cd bsv-language-server
          npm run compile

      - name: Install vsce
        run: |
          npm install -g @vscode/vsce

      - name: Package VSIX
        run: |
          cd bsv-language-server
          vsce package --target linux-x64 --out ../bsv-language-server-linux-x64.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsv-language-server-linux-x64
          path: bsv-language-server-linux-x64.vsix
          retention-days: 5

  linux-arm64:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bsv-language-server/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build Tree-sitter BSV parser
        run: |
          cd tree-sitter-bsv
          npm install
          npx tree-sitter generate
          npx tree-sitter test

      - name: Build Rust language server
