name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-matrix:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-20.04
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: windows-2019
            platform: win32
            arch: x64
            target: x86_64-pc-windows-msvc
          - os: windows-2019
            platform: win32
            arch: arm64
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            platform: darwin
            arch: x64
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: darwin
            arch: arm64
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bsv-language-server/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install tree-sitter CLI
        run: |
          npm install -g tree-sitter-cli

      - name: Build Tree-sitter BSV parser
        run: |
          cd tree-sitter-bsv
          npm install
          npx tree-sitter generate
          npx tree-sitter test

      - name: Build Rust language server
        run: |
          cd bsv-language-server
          cargo build --release --target ${{ matrix.target }}
          
          # Create bin directory for packaging
          mkdir -p bin
          
          # Copy binary with appropriate naming
          if [ "${{ matrix.platform }}" = "win32" ]; then
            cp target/${{ matrix.target }}/release/bsv-language-server.exe bin/
          else
            cp target/${{ matrix.target }}/release/bsv-language-server bin/
            chmod +x bin/bsv-language-server
          fi

      - name: Install VS Code Extension dependencies
        run: |
          cd bsv-language-server
          npm ci

      - name: Compile TypeScript client
        run: |
          cd bsv-language-server
          npm run compile

      - name: Install vsce
        run: |
          npm install -g @vscode/vsce

      - name: Verify binary existence
        run: |
          cd bsv-language-server
          if [ "${{ matrix.platform }}" = "win32" ]; then
            ls -la bin/bsv-language-server.exe
          else
            ls -la bin/bsv-language-server
          fi

      - name: Package VSIX
        run: |
          cd bsv-language-server
          # Ensure bin directory is included in package
          echo "Including binaries in package..."
          ls -la bin/
          vsce package --target ${{ matrix.platform }}-${{ matrix.arch }} --out ../bsv-language-server-${{ matrix.platform }}-${{ matrix.arch }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsv-language-server-${{ matrix.platform }}-${{ matrix.arch }}
          path: bsv-language-server-${{ matrix.platform }}-${{ matrix.arch }}.vsix
          retention-days: 5

  create-release:
    runs-on: ubuntu-20.04
    needs: build-matrix
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.vsix" | sort

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/bsv-language-server-linux-x64/bsv-language-server-linux-x64.vsix
            artifacts/bsv-language-server-linux-arm64/bsv-language-server-linux-arm64.vsix
            artifacts/bsv-language-server-win32-x64/bsv-language-server-win32-x64.vsix
            artifacts/bsv-language-server-win32-arm64/bsv-language-server-win32-arm64.vsix
            artifacts/bsv-language-server-darwin-x64/bsv-language-server-darwin-x64.vsix
            artifacts/bsv-language-server-darwin-arm64/bsv-language-server-darwin-arm64.vsix