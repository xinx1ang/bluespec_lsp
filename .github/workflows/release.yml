          # 创建server目录并复制二进制文件
          mkdir -p server/win32-x64
          cp target/x86_64-pc-windows-msvc/release/bsv-language-server.exe server/win32-x64/

      - name: Install VS Code Extension dependencies
        shell: bash
        run: |
          cd bsv-language-server
