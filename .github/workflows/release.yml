        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bsv-language-server/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tree-sitter BSV parser
        shell: bash
        run: |
          cd tree-sitter-bsv
