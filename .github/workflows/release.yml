      - name: Upload macOS ARM64 VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsv-language-server-darwin-arm64
          path: bsv-language-server-darwin-arm64.vsix
          retention-days: 5

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux-x64, build-linux-arm64, build-windows-x64, build-windows-arm64, build-macos-x64, build-macos-arm64]
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.vsix" | sort
          echo ""
          echo "Artifact sizes:"
          ls -lh artifacts/*/*.vsix

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/bsv-language-server-linux-x64/bsv-language-server-linux-x64.vsix
            artifacts/bsv-language-server-linux-arm64/bsv-language-server-linux-arm64.vsix
            artifacts/bsv-language-server-win32-x64/bsv-language-server-win32-x64.vsix
            artifacts/bsv-language-server-win32-arm64/bsv-language-server-win32-arm64.vsix
            artifacts/bsv-language-server-darwin-x64/bsv-language-server-darwin-x64.vsix
            artifacts/bsv-language-server-darwin-arm64/bsv-language-server-darwin-arm64.vsix