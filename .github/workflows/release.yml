name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bsv-language-server/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Tree-sitter BSV parser
        run: |
          cd tree-sitter-bsv
          npm install
          npx tree-sitter generate
          npx tree-sitter test

      - name: Build Rust language server
        run: |
          cd bsv-language-server
          cargo build --release --target x86_64-unknown-linux-gnu
          
          # 创建server目录并复制二进制文件
          mkdir -p server/linux-x64
          cp target/x86_64-unknown-linux-gnu/release/bsv-language-server server/linux-x64/
          chmod +x server/linux-x64/bsv-language-server

      - name: Install VS Code Extension dependencies
        run: |
          cd bsv-language-server
          npm install

      - name: Compile TypeScript client
        run: |
          cd bsv-language-server
          npm run compile

      - name: Install vsce
        run: |
          npm install -g @vscode/vsce

      - name: Package VSIX for Linux x64
        run: |
          cd bsv-language-server
          vsce package --target linux-x64 --out ../bsv-language-server-linux-x64.vsix

      - name: Upload Linux x64 VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsv-language-server-linux-x64
          path: bsv-language-server-linux-x64.vsix
          retention-days: 5

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bsv-language-server/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # 设置正确的链接器
          rustup target add aarch64-unknown-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' > ~/.cargo/config
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config

      - name: Build Tree-sitter BSV parser
        run: |
          cd tree-sitter-bsv
          npm install
          npx tree-sitter generate
          npx tree-sitter test

      - name: Build Rust language server
        run: |
          cd bsv-language-server
          # 设置正确的环境变量用于交叉编译
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --release --target aarch64-unknown-linux-gnu
          # 创建server目录并复制二进制文件
          mkdir -p server/linux-arm64
          cp target/aarch64-unknown-linux-gnu/release/bsv-language-server server/linux-arm64/
          chmod +x server/linux-arm64/bsv-language-server

      - name: Install VS Code Extension dependencies
        run: |
          cd bsv-language-server
          npm install

      - name: Compile TypeScript client
        run: |
          cd bsv-language-server
          npm run compile

      - name: Install vsce
        run: |
          npm install -g @vscode/vsce

      - name: Package VSIX for Linux ARM64
        run: |
          cd bsv-language-server
          vsce package --target linux-arm64 --out ../bsv-language-server-linux-arm64.vsix

      - name: Upload Linux ARM64 VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsv-language-server-linux-arm64
          path: bsv-language-server-linux-arm64.vsix
          retention-days: 5

  build-windows-x64:
    runs-on: windows-latest
    steps:
