      - name: Build Rust language server
        run: |
          cd bsv-language-server
          cargo build --release --target aarch64-apple-darwin
          mkdir -p server/darwin-arm64
          cp target/aarch64-apple-darwin/release/bsv-language-server server/darwin-arm64/
          chmod +x server/darwin-arm64/bsv-language-server

      - name: Install VS Code Extension dependencies
        run: |
